model_list:
  - model_name: ornith-1.0
    litellm_params:
      model: openai/ornith-1.0
      api_base: http://vllm:8000/v1
      api_key: EMPTY

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  alerting: []
  proxy_batch_write_at: 60
  disable_error_logs: true

litellm_settings:
  request_timeout: 600
  set_verbose: false
  json_logs: true
